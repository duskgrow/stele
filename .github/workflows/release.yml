name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - uses: actions/cache@v4
        with:
          path: |
            target/
            ~/.cargo/registry/
          key: cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-

      - name: Build
        run: nix develop --command cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stele-x86_64-linux
          path: target/x86_64-unknown-linux-gnu/release/stele

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/stele-x86_64-linux/stele

      - name: Generate sources.nix
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HASH=$(nix hash file --type sha256 --sri artifacts/stele-x86_64-linux/stele)

          cat > nix/sources.nix <<NIX
          # Auto-generated by CI. Do not edit manually.
          {
            version = "${VERSION}";
            hashes = {
              x86_64-linux = "${HASH}";
            };
          }
          NIX

      - name: Commit sources.nix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nix/sources.nix
          git commit -m "chore: update sources.nix for ${GITHUB_REF_NAME}"
          git push
