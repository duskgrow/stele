name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            system: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            system: aarch64-linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Build
        run: |
          DEV_SHELL="${{ matrix.system == 'aarch64-linux' && '.#cross' || '' }}"
          nix develop $DEV_SHELL --command cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stele-${{ matrix.system }}
          path: target/${{ matrix.target }}/release/stele

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/stele-x86_64-linux/stele
            artifacts/stele-aarch64-linux/stele

      - name: Generate sources.nix
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          X86_HASH=$(nix hash file --type sha256 --base32 artifacts/stele-x86_64-linux/stele)
          ARM64_HASH=$(nix hash file --type sha256 --base32 artifacts/stele-aarch64-linux/stele)

          cat > nix/sources.nix <<NIX
          # Auto-generated by CI. Do not edit manually.
          {
            version = "${VERSION}";
            hashes = {
              x86_64-linux = "${X86_HASH}";
              aarch64-linux = "${ARM64_HASH}";
            };
          }
          NIX

      - name: Commit sources.nix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nix/sources.nix
          git commit -m "chore: update sources.nix for ${GITHUB_REF_NAME}"
          git push
